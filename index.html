<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pookie Secrets ✨</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;500&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ffe9f3 0%, #fff5f5 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .pookie-font {
            font-family: 'Fredoka', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 182, 193, 0.3);
            border-radius: 30px;
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* Social bar safe placement */
        .social-bar-wrapper {
            position: fixed;
            bottom: 15px;
            left: 15px;
            z-index: 1;
        }

        /* Keep main card above ads */
        .main-card {
            position: relative;
            z-index: 10;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Floating Decorations -->
    <div class="absolute top-10 left-10 text-4xl floating" style="animation-delay: 0s;">🌸</div>
    <div class="absolute bottom-20 right-10 text-4xl floating" style="animation-delay: 2s;">🎀</div>
    <div class="absolute top-1/2 left-5 text-3xl floating" style="animation-delay: 1s;">✨</div>

    <!-- SOCIAL BAR SCRIPT -->
    <!-- Positioned safely away from center card -->
    <div class="social-bar-wrapper">
        <script src="https://pl29327853.profitablecpmratenetwork.com/ae/2f/ad/ae2fad514d7c4219ef12f6032d341e55.js"></script>
    </div>

    <!-- MAIN CARD -->
    <div class="glass-card main-card w-full max-w-md p-8 shadow-2xl transition-all hover:shadow-pink-200">

        <div class="text-center mb-8">
            <h1 class="pookie-font text-3xl font-medium text-pink-500 mb-2">
                Spill the Tea, Pookie! ☕
            </h1>

            <p class="text-gray-500 text-sm italic">
                Tell me your darkest or dirtiest secret...
            </p>
        </div>

        <div class="space-y-6">

            <!-- TEXTAREA -->
            <div class="relative">
                <textarea
                    id="secretInput"
                    placeholder="Type your secret here..."
                    class="w-full h-40 p-4 bg-white/50 border-2 border-pink-100 rounded-2xl focus:ring-4 focus:ring-pink-200 focus:border-pink-300 outline-none transition-all resize-none text-gray-700"
                ></textarea>

                <span class="absolute bottom-3 right-4 text-xs text-pink-300">
                    100% Anonymous 🔒
                </span>
            </div>

            <!-- CHECKBOX -->
            <div class="flex items-center justify-between px-2">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" checked class="accent-pink-400 w-4 h-4">

                    <span class="text-sm text-gray-400">
                        Keep it anonymous
                    </span>
                </label>
            </div>

            <!-- CONTINUE BUTTON -->
            <button
                id="continueBtn"
                class="w-full py-4 bg-pink-400 hover:bg-pink-500 text-white rounded-2xl font-bold shadow-lg shadow-pink-200 transition-all active:scale-95 pookie-font tracking-wide"
            >
                CONTINUE ✨
            </button>
        </div>

        <p class="text-center mt-6 text-[10px] text-gray-400 uppercase tracking-widest">
            no judging, just vibes
        </p>
    </div>

    <!-- POPUNDER TRIGGER SCRIPT -->
    <script>
        const continueBtn = document.getElementById('continueBtn');
        const secretInput = document.getElementById('secretInput');

        continueBtn.addEventListener('click', function () {

            // Optional: prevent empty submissions
            if (secretInput.value.trim() === '') {
                alert('Please type your secret first ✨');
                return;
            }

            // Load Popunder Script ONLY on button click
            const popunderScript = document.createElement('script');

            popunderScript.src =
                'https://pl29327852.profitablecpmratenetwork.com/e9/a6/2f/e9a62f0236d4cba7b9945285a51a12fd.js';

            popunderScript.async = true;

            document.body.appendChild(popunderScript);

            // Example next action
            setTimeout(() => {
                alert('Your secret has been submitted anonymously 💖');
            }, 500);
        });
    </script>

</body>
</html>
